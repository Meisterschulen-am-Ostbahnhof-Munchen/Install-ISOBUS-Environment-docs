markdown_extensions:
- attr_list
- md_in_html
- tables
- fenced_code
- toc:
    permalink: true
plugins:
- search
site_name: Grundlagen der C-Programmierung in ISOBUS (1)
site_url: https://docs.ms-muc-docs.de/projects/Install-ISOBUS-Environment-docs/
theme:
  features:
  - navigation.sections
  - navigation.expand
  - search.suggest
  - search.highlight
  language: de
  name: material
  palette:
  - accent: indigo
    primary: indigo
    scheme: default
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode
  - accent: indigo
    primary: indigo
    scheme: slate
    toggle:
      icon: material/brightness-4
      name: Switch to light mode
